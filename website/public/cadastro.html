<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/cadastro.css">
</head>
<body>
    <main>
        <!-- Formulario -->
        <div class="formulario">
           <h2>
                Cadastro
           </h2> 

           <!-- Inputs -->
           <div class="inputs">
                <!-- Input nome -->
                <div>
                    <label for="ipt_nome">Nome: </label>
                    <input type="text" id="ipt_nome" placeholder="Nome">
                </div>

                <!-- Input email -->
                <div>
                    <label for="ipt_email">E-mail: </label>
                    <input type="email" id="ipt_email" placeholder="email@exemplo.com">
                </div>

                <!-- Input senha -->
                <div>
                    <label for="ipt_senha">Senha: </label>
                    <input type="password" id="ipt_senha" placeholder="Senha">
                </div>
           </div>

           <!-- Links -->
           <div class="links">
                <button class="texto-branco">
                    <a href="#" class="texto-branco">Entrar</a>
                </button>

                <p class="texto-branco">
                    Já possui conta? <a href="./login.html" class="texto-branco">Faça login aqui</a>
                </p>
           </div>
        </div>

        <div class="imagem">
            <a href="./index.html">
                <img src="./assets/icons/logout.svg" alt="">
            </a>
        </div>
    </main>
</body>
</html>
