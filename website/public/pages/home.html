<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/home.css">

    <link rel="shortcut icon" href="../assets/icons/game.png" type="image/x-icon">
</head>
<body onload="principal()">
    <header class="roxo" id="header">
        <!-- Área do usuario -->
        <div class="info-usuario">
            <!-- Imagem usuario -->
            <div class="area-imagem-usuario" id="area_imagem">
                <img src="../assets/imgs/home/icon-charizrd.svg" alt="">
            </div>

            <!-- Nome do usuario -->
            <h2 id="nome_usuario">
                Mega Charizard X
            </h2>
        </div>

        <!-- Logout -->
        <div class="imagem">
            <a href="../index.html">
                <img src="../assets/icons/logout.svg" alt="">
            </a>
        </div>
    </header>

    <main>
        <!-- cards -->
        <div class="cards">
            <!-- Card charizard -->
            <div class="card card-charizard">
                <h3>Sobre o jogo</h3>

                <div>
                    <img src="../assets/imgs/home/charizard-card.svg" alt="">
                </div>
            </div>

            <!-- Card  mimikyu -->
            <div class="card card-mimikyu">
                <h3>QUIZ</h3>

                <div>
                    <img src="../assets/imgs/home/mimikyu-card.svg" alt="">
                </div>
            </div>

            <!-- Card nidoking -->
            <div class="card card-nidoking">
                <h3>Evolução dos jogos</h3>
                
                <div>
                    <img src="../assets/imgs/home/nidoking-card.svg" alt="">
                </div>
            </div>
        </div>
    </main>


    <footer class="roxo" id="footer">
        <img src="../assets/imgs/master-ball.svg" alt="Master ball" class="invertido">

        <p class="texto-branco">
            &copy; 2026 <strong><a href="https://github.com/luizPhelipeSantana" target="_blank">Luiz Phelipe</a></strong> - Todos os direitos reservados
        </p>

        <img src="../assets/imgs/master-ball.svg" alt="Master ball">
    </footer>
</body>

<script>
    function principal() {
        nome_usuario.innerHTML = sessionStorage.NOME_USUARIO;
        nome_usuario.style.color = sessionStorage.COR_SECUNDARIA;
        area_imagem.innerHTML = `
            <img src="${sessionStorage.FOTO_URL}">
        `;

        header.style.backgroundColor = sessionStorage.COR_PRINCIPAL;
        footer.style.backgroundColor = sessionStorage.COR_PRINCIPAL;
    }
</script>
</html>
