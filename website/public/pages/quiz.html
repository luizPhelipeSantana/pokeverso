<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ</title>

    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/quiz.css">

    <link rel="shortcut icon" href="../assets/icons/game.png" type="image/x-icon">
</head>
<body>
    <main>
        <!-- Primeira imagem -->
        <div class="imagem">
            <img src="../assets/imgs/quiz/meowscarada.svg" alt="">
        </div>

        <!-- Formulario -->
        <div class="formulario">
            <div class="formulario_entrada">
                <!-- Input -->
                <div class="input">
                    <div class="div_auto_complete">
                        <input type="text" id="ipt_pokemon" placeholder="Nome do pokémon" onkeyup="auto_complete()" onblur="tirar_auto_complete()" autocomplete="off">
                        <ul id="lista_pokemon" class="lista_auto_complete">

                        </ul>
                    </div>
                </div>

                <!-- Saida-->
                <div class="saidas">
                    <!-- Descrição -->
                    <div class="descricoes">
                        <!-- Pokemon -->
                        <div class="descricao">
                            <h2>
                                Pokémon
                            </h2>

                            <div class="barra">

                            </div>
                        </div>

                        <!-- Nome -->
                        <div class="descricao">
                            <h2>
                                Nome
                            </h2>

                            <div class="barra">

                            </div>
                        </div>

                        <!-- Tipo 1 -->
                        <div class="descricao">
                            <h2>
                                Tipo 1
                            </h2>

                            <div class="barra">

                            </div>
                        </div>

                        <!-- Tipo 2 -->
                        <div class="descricao">
                            <h2>
                                Tipo 2
                            </h2>

                            <div class="barra">

                            </div>
                        </div>

                        <!-- Geração -->
                        <div class="descricao">
                            <h2>
                                Geração
                            </h2>

                            <div class="barra">

                            </div>
                        </div>
                    </div>
                    

                    <!-- Respostas-->
                    <div class="respostas">
                    </div>
                </div>
            </div>

            <!-- Area de imagem do formulario -->
            <div class="imagem_formulario">
                <img src="../assets/imgs/quiz/sprigatito.svg" alt="">
            </div>
        </div>

        <!-- Segunda imagem -->
        <div class="imagem">
            <img src="../assets/imgs/quiz/floragato.svg" alt="">
        </div>
    </main>
</body>

<script>
    function tirar_auto_complete() {
        setTimeout(() => lista_pokemon.innerHTML = "",
        100);
    }

    function alterarInput(pokemon) {
        ipt_pokemon.value = pokemon;
    }

    function auto_complete() {
        let pokemon = ipt_pokemon.value.trim();

        fetch("/pokemon/autocomplete/" + pokemon)
        .then(resposta => {
            if (resposta.ok) {
                return resposta.json();
            }
            else {
                console.log("Erro" + resposta.status);
            }
        })
        .then(listaPokemon => {
            lista_pokemon.innerHTML = "";

            for (let i = 0; i < listaPokemon.length; i++) {
                lista_pokemon.innerHTML += `
                    <li onclick="alterarInput('${listaPokemon[i].nome}')">
                        <img src="${listaPokemon[i].foto_url}" class="imagem_auto_complete">
                        ${listaPokemon[i].nome}
                    </li>
                `;
            }

            if (listaPokemon.length <= 0) {
                lista_pokemon.innerHTML = "";
            }
        })
        .catch((erro) => {
            console.log(erro);
        })
    }
</script>
</html>
