<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ</title>

    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/quiz.css">

    <link rel="shortcut icon" href="../assets/icons/game.png" type="image/x-icon">
</head>
<body onload="carregarPokemon()">
    <div class="modal_resultado" id="modal_resultado">
        
    </div>

    <main>
        <!-- Primeira imagem -->
        <div class="imagem">
            <img src="../assets/imgs/quiz/meowscarada.svg" alt="">
        </div>

        <!-- Formulario -->
        <div class="formulario">
            <div class="formulario_entrada">
                <!-- Input -->
                <div class="input">
                    <div class="div_auto_complete">
                        <input type="text" id="ipt_pokemon" placeholder="Nome do pokémon" onkeyup="auto_complete()" onblur="tirar_auto_complete()" onfocus="auto_complete()" autocomplete="off">
                        <ul id="lista_pokemon" class="lista_auto_complete">

                        </ul>
                    </div>
                </div>

                <!-- Saida-->
                <div class="saidas">
                    <!-- Descrição -->
                    <div class="descricoes">
                        <!-- Pokemon -->
                        <div class="descricao">
                            <h2>
                                Pokémon
                            </h2>

                            <div class="barra">

                            </div>
                        </div>

                        <!-- Nome -->
                        <div class="descricao">
                            <h2>
                                Nome
                            </h2>

                            <div class="barra">

                            </div>
                        </div>

                        <!-- Tipo 1 -->
                        <div class="descricao">
                            <h2>
                                Tipo 1
                            </h2>

                            <div class="barra">

                            </div>
                        </div>

                        <!-- Tipo 2 -->
                        <div class="descricao">
                            <h2>
                                Tipo 2
                            </h2>

                            <div class="barra">

                            </div>
                        </div>

                        <!-- Geração -->
                        <div class="descricao">
                            <h2>
                                Geração
                            </h2>

                            <div class="barra">

                            </div>
                        </div>
                    </div>
                    

                    <!-- Respostas-->
                    <div class="respostas" id="respostas">
                        
                    </div>
                </div>
            </div>

            <!-- Area de imagem do formulario -->
            <div class="imagem_formulario">
                <img src="../assets/imgs/quiz/sprigatito.svg" alt="">
            </div>
        </div>

        <!-- Segunda imagem -->
        <div class="imagem">
            <img src="../assets/imgs/quiz/floragato.svg" alt="">
        </div>
    </main>
</body>

<script>
    let idPokemonSorteado = 1;
    let tentativas = 0;
    let pokemon = {
        "id": idPokemonSorteado,
        "nome": "",
        "tipo_1": "",
        "tipo_2": "",
        "geracao": ""
    }

    document.addEventListener("keydown", (evento) => {
        if (evento.key == "Enter") {
            enviar();
        }
    });

    function carregarPokemon() {
        idPokemonSorteado = Math.round(Math.random() * 1086 - 1) + 1;
        pokemon = {
            "id": idPokemonSorteado,
            "nome": "",
            "tipo_1": "",
            "tipo_2": "",
            "geracao": ""
        }

        tentativas = 0;
        modal_resultado.style.display = "none";
        respostas.innerHTML = "";

        fetch("/pokemon/" + idPokemonSorteado)
            .then(resposta => {
                if (resposta.ok) {
                    if (resposta.status === 204) return null;
                    return resposta.json();
                }
                else {
                    console.log("Erro: " + resposta.status);
                }
            })
            .then(listaPokemon => {
                if (listaPokemon <= 0) {
                    console.error("Nenhum pokémon foi encontrado");
                }

                pokemon.nome = listaPokemon[0].nome;
                pokemon.tipo_1 = listaPokemon[0].tipagem_1;
                pokemon.tipo_2 = listaPokemon[0].tipagem_2;
                pokemon.geracao = listaPokemon[0].id_geracao;

            })
            .catch((erro) => {
                console.log(erro);
            })
    }

    function enviar() {
        let pokemonNome = ipt_pokemon.value.trim();
        ipt_pokemon.value = "";
        tentativas++;

        fetch("/pokemon/quiz/" + pokemonNome)
            .then(resposta => {
                if (resposta.ok) {
                    if (resposta.status === 204) return null;
                    return resposta.json();
                }
                else {
                    console.log("Erro" + resposta.status);
                }
            })
            .then(listaPokemon => {
                if (listaPokemon <= 0) {
                    alert("Nenhum pokémon foi encontrado!")
                }

                let id = listaPokemon[0].id_pokemon;

                let imagem = listaPokemon[0].foto_url;
                let nome = listaPokemon[0].nome;
                let tipo_1 = listaPokemon[0].tipagem_1;
                let tipo_2 = listaPokemon[0].tipagem_2;
                let geracao = listaPokemon[0].id_geracao;

                let respostaGeracao = "correto";

                if (geracao > pokemon.geracao) {
                    respostaGeracao = "menor";
                }
                else if (geracao < pokemon.geracao) {
                    respostaGeracao = "maior";
                }

                let resTipo_1 = "errado";

                if (tipo_1 == pokemon.tipo_1) {
                    resTipo_1 = "correto";
                }
                else if (tipo_1 == pokemon.tipo_2) {
                    resTipo_1 = "parcial"
                }

                let resTipo_2 = "errado";

                if (tipo_2 == pokemon.tipo_2) {
                    resTipo_2 = "correto";
                }
                else if (tipo_2 == pokemon.tipo_1) {
                    resTipo_2 = "parcial"
                }

                let resposta = `
                    <div class="resposta">
                        <div class="quadrado imagem_pokemon" style="background-image: url('${imagem}');">
                        </div>
                        <div class="quadrado ${(nome == pokemon.nome) ? "correto" : "errado"}">
                            <h3>${nome}</h3>
                        </div>
                        <div class="quadrado ${resTipo_1}">
                            <h3>${tipo_1}</h3>
                        </div>
                        <div class="quadrado ${resTipo_2}">
                            <h3>${tipo_2}</h3>
                        </div>
                        <div class="quadrado ${respostaGeracao}">
                            <h3>${geracao}</h3>
                        </div>
                    </div>
                `;

                respostas.innerHTML += resposta;

                if (id == idPokemonSorteado) {
                    modal_resultado.innerHTML = `
                        <h2>
                            Parabéns você acertou
                        </h2>

                        <div class="imagem-area">
                            <div class="imagem_pokemon" style="background-image: url('${imagem}');">

                            </div>

                            <p style="font-size: 20px;">${nome}</p>
                        </div>

                        <p>
                            Você acertou em ${tentativas} tentativas
                        </p>

                        <button onclick="carregarPokemon()">
                            Continuar
                        </button>
                    `;

                    setTimeout(() => modal_resultado.style.display = "flex", 
                    100);
                }
            })
            .catch((erro) => {
                console.log(erro);
            })
    }

    function tirar_auto_complete() {
        setTimeout(() => lista_pokemon.innerHTML = "",
        100);
    }

    function alterarInput(pokemon) {
        ipt_pokemon.value = pokemon;
    }

    function auto_complete() {
        let pokemon = ipt_pokemon.value.trim();

        fetch("/pokemon/autocomplete/" + pokemon)
            .then(resposta => {
                if (resposta.ok) {
                    return resposta.json();
                }
                else {
                    console.log("Erro" + resposta.status);
                }
            })
            .then(listaPokemon => {
                lista_pokemon.innerHTML = "";

                for (let i = 0; i < listaPokemon.length; i++) {
                    lista_pokemon.innerHTML += `
                        <li onclick="alterarInput('${listaPokemon[i].nome}')">
                            <img src="${listaPokemon[i].foto_url}" class="imagem_auto_complete" onclick="alterarInput('${listaPokemon[i].nome}')">
                            <p onclick="alterarInput('${listaPokemon[i].nome}')">${listaPokemon[i].nome}</p>
                        </li>
                    `;
                }

                if (listaPokemon.length <= 0) {
                    lista_pokemon.innerHTML = "";
                }
            })
            .catch((erro) => {
                console.log(erro);
            })
    }
</script>
</html>
