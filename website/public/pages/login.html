<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokeverso</title>

    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/login.css">
    <link rel="shortcut icon" href="../assets/icons/game.png" type="image/x-icon">

</head>
<body>
    <main>
        <!-- Primeira imagem -->
        <div class="imagem">
            <img src="../assets/imgs/login/decidueye-1.svg" alt="Decidueye apontando um arco e flecha" class="decidueye-img">
        </div>

        <!-- Formulario -->
        <div class="formulario">
            <h2 class="texto-branco">
                Login
            </h2>

            <!-- Inputs-->
            <div class="inputs">
                <!-- Email -->
                <div>
                    <label for="ipt_email" class="texto-branco">
                        E-mail:
                    </label>
                    <input type="email" id="ipt_email" placeholder="email@exemplo.com">
                </div>

                <!-- Senha -->
                <div>
                    <label for="ipt_senha" class="texto-branco">
                        Senha:
                    </label>
                    <input type="password" id="ipt_senha" placeholder="Senha">
                </div>
            </div>

            <!-- Botões -->
            <div class="links">
                <button class="texto-branco" onclick="entrar()">
                    Entrar
                </button>

                <p class="texto-branco">
                    Não possui conta? <a href="./cadastro.html" class="texto-branco">Cadastrar-se</a>
                </p>
            </div>
        </div>

        <!-- Segunda imagem -->
        <div class="imagem-sair">
            <!-- Logout -->
            <div class="logout">
                <a href="../index.html">
                    <img src="../assets/icons/logout.svg" alt="Botão para sair">
                </a>
            </div>

            <!-- Imagem-->
            <div class="imagem">
                <img src="../assets/imgs/login/decidueye-2.svg" alt="Decidueye com a asa aberta" class="decidueye-img">
            </div>
        </div>
    </main>
</body>

<script>
    function entrar() {
        let emailVar = ipt_email.value;
        let senhaVar = ipt_senha.value;

        if (emailVar == "" || senhaVar == "") {
            alert("Preencha todos os campos");
        }

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));

                    sessionStorage.ID_USUARIO = json.id;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ADMIN = json.admin;
                    sessionStorage.COR_PRINCIPAL = json.cor_principal;
                    sessionStorage.COR_SECUNDARIA = json.cor_secundaria;
                    sessionStorage.FOTO_URL = json.foto_url;

                    window.location = "./home.html";

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);

                    alert("Erro ao tentar fazer login");
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }
</script>
</html>
