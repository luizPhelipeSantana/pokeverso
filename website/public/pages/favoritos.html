<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokeverso</title>

    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/favoritos.css">
    <link rel="shortcut icon" href="../assets/icons/game.png" type="image/x-icon">
</head>
<body>
    <main>
        <!-- Primeira imagem -->
        <div class="imagem">
            <img src="../assets/imgs/favoritos/quagsire-1.svg" alt="Quagsire" class="quagsire-1">
        </div>

        <!-- Formulario -->
        <div class="formulario">
            <h2>
                Favoritos
            </h2>

            <!-- Inputs-->
            <div class="inputs">
                <!-- Pokemon favorito -->
                <div>
                    <label for="ipt_pokemon_favorito">
                        Pokémon favorito
                    </label>

                    <div class="div_auto_complete">
                        <input type="text" id="ipt_pokemon_favorito" placeholder="Quagsire" onkeyup="auto_complete('pokemon')" onblur="tirar_auto_complete('pokemon')" autocomplete="off">
                        <ul id="lista_pokemon" class="lista_auto_complete">

                        </ul>
                    </div>
                </div>

                <!-- Jogo favorito -->
                <div>
                    <label for="ipt_jogo_favorito">
                        Jogo favorito
                    </label>
                    <div class="div_auto_complete">
                        <input type="text" id="ipt_jogo_favorito" placeholder="Fire red" onkeyup="auto_complete('jogos')" onblur="tirar_auto_complete('jogos')" autocomplete="off">
                        <ul id="lista_jogos" class="lista_auto_complete">

                        </ul>
                    </div>
                </div>

                <!-- Geração favorita -->
                <div>
                    <label for="ipt_geracao_favorita">
                        Geração favorita
                    </label>

                    <div class="div_auto_complete">
                        <input type="text" id="ipt_geracao_favorita" placeholder="Primeira geração" onkeyup="auto_complete('geracoes')" onblur="tirar_auto_complete('geracoes')" autocomplete="off">
                        <ul id="lista_geracoes" class="lista_auto_complete">

                        </ul>
                    </div>
                </div>
            </div>

            <!-- Botões -->
            <div class="links">
                <button class="texto-branco" onclick="favoritosHtml()">
                    Entrar
                </button>
            </div>
        </div>

        <!-- Segunda imagem -->
        <div class="imagem">
            <img src="../assets/imgs/favoritos/quagsire-2.svg" alt="Quagsire" class="quagsire-1">
        </div>
    </main>
</body>

<script src="../script/cadastro.js"></script>

<script>
     function favoritosHtml() {
        let pokemon_favorito = ipt_pokemon_favorito.value;
        let jogo_favorito = ipt_jogo_favorito.value;
        let geracao_favorita = ipt_geracao_favorita.value;

        let res = favorito(pokemon_favorito, jogo_favorito, geracao_favorita);
     }


    function auto_complete(input) {
        if (input == "pokemon") {
            let pokemon = ipt_pokemon_favorito.value.trim();

            fetch("/pokemon/autocomplete/" + pokemon)
            .then(resposta => {
                if (resposta.ok) {
                    return resposta.json();
                }
                else {
                    console.log("Erro" + resposta.status);
                }
            })
            .then(listaPokemon => {
                lista_pokemon.innerHTML = "";

                for (let i = 0; i < listaPokemon.length; i++) {
                    lista_pokemon.innerHTML += `
                        <li onclick="alterarInput('pokemon', '${listaPokemon[i].nome}')">
                            <img src="${listaPokemon[i].foto_url}" class="imagem_auto_complete">
                            ${listaPokemon[i].nome}
                        </li>
                    `;
                }

                if (listaPokemon.length <= 0) {
                    lista_pokemon.innerHTML = "";
                }
            })
            .catch((erro) => {
                console.log(erro);
            })
        }
        else if (input == "jogos") {
            let jogo = ipt_jogo_favorito.value.trim();

            fetch("/jogo/autocomplete/" + jogo)
                .then(resposta => {
                    if (resposta.ok) {
                        return resposta.json();
                    }
                    else {
                        console.log("Erro" + resposta.status);
                    }
                })
                .then(listaJogos => {
                    lista_jogos.innerHTML = "";

                    for (let i = 0; i < listaJogos.length; i++) {
                        lista_jogos.innerHTML += `
                            <li onclick="alterarInput('jogos', '${listaJogos[i].nome}')">
                                ${listaJogos[i].nome}
                            </li>
                        `;
                    }

                    if (listaJogos.length <= 0) {
                        lista_jogos.innerHTML = "";
                    }
                })
                .catch((erro) => {
                    console.log(erro);
                })
        }
        else if (input == "geracoes") {
            let geracao = ipt_geracao_favorita.value.trim();

            fetch("/geracao/autocomplete/" + geracao)
                .then(resposta => {
                    if (resposta.ok) {
                        return resposta.json();
                    }
                    else {
                        console.log("Erro" + resposta.status);
                    }
                })
                .then(listaGeracoes => {
                    lista_geracoes.innerHTML = "";

                    for (let i = 0; i < listaGeracoes.length; i++) {
                        lista_geracoes.innerHTML += `
                            <li onclick="alterarInput('geracoes', '${listaGeracoes[i].nome}')">
                                ${listaGeracoes[i].nome}
                            </li>
                        `;
                    }

                    if (listaGeracoes.length <= 0) {
                        lista_geracoes.innerHTML = "";
                    }
                })
                .catch((erro) => {
                    console.log(erro);
                })
        }
    }

    function alterarInput(input, valor) {
        if (input == "pokemon") {
            ipt_pokemon_favorito.value = valor;
        }
        else if (input == "jogos") {
            ipt_jogo_favorito.value = valor;
        }
        else if (input == "geracoes") {
            ipt_geracao_favorita.value = valor;
        }
    }

    function tirar_auto_complete(input) {
        if (input == "pokemon") {
            setTimeout(() => lista_pokemon.innerHTML = "",
            100);
        }
        else if (input == "jogos") {
            setTimeout(() => lista_jogos.innerHTML = "",
            100);
        }
        else if (input == "geracoes") {
            setTimeout(() => lista_geracoes.innerHTML = "",
            100);
        }
    }
</script>
</html>
