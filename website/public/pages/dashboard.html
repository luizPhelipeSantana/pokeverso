<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/dashboard.css">
    <link rel="shortcut icon" href="../assets/icons/game.png" type="image/x-icon">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <!-- KPIs -->
        <div class="kpis">
            <div  class="area-kpi">
                <h3>Pokémon mais escolhido como favorito</h3>
                <!-- Pokémon mais escolhido como favorito -->
                <div class="kpi" id="kpi_pokemon">
                    Quagsire
                </div>
            </div>

            <div  class="area-kpi">
                <h3>Jogo mais escolhido como favorito</h3>
                <!-- Jogo mais escolhido como favorito -->
                <div class="kpi" id="kpi_jogo">
                    Pokémon FireRed
                </div>
            </div>

            <div  class="area-kpi">
                <h3>Geração mais escolhida como favorita</h3>
                <!-- Geração mais escolhida como favorita-->
                <div class="kpi" id="kpi_geracao">
                    Primeira Geração I
                </div>
            </div>
        </div>

        <!-- Botão de sair-->
        <div class="imagem-sair">
            <!-- Logout -->
            <div class="logout">
                <a href="../pages/home.html">
                    <img src="../assets/icons/logout.svg" alt="Botão para sair">
                </a>
            </div>
        </div>
    </header>

    <main>
        <!-- Gráficos -->
        <div class="graficos">
            <!-- Pokémon mais escolhidos como favoritos -->
            <div class="grafico">
                <h2>5 pokémon mais populares</h2>
                <canvas id="grafico_pokemon"></canvas>
            </div>

            <!-- Jogos mais escolhidos como favoritos-->
            <div class="grafico">
                <h2>5 jogos mais populares</h2>
                <canvas id="grafico_jogo"></canvas>
            </div>
        </div>
    </main>
</body>

<script>
    window.onload = () => {
        carregarGraficoPokemon();
        carregarGraficoJogos();
        carregarKpiPokemon();
        carregarKpiJogo();
        carregarKpiGeracao();

        setInterval(() => {
            carregarGraficoPokemon();
            carregarGraficoJogos();
            carregarKpiPokemon();
            carregarKpiJogo();
            carregarKpiGeracao();
        }, 300000);
    };

    let graficoPokemon;
    let graficoJogos;

    function carregarGraficoPokemon() {

        fetch('/dashboard/grafico/pokemon', { cache: 'no-store' })
            .then(function (response){
                if (response.ok) {
                    return response.json();
                }

                throw new Error('Erro ao buscar dados dos pokémons');
            })
            .then(function (resposta) {

                let labels = [];
                let dados = [];
                let cores = [];

                for (let i = 0; i < resposta.length; i++) {
                    labels.push(resposta[i].pokemon);
                    dados.push(resposta[i].quantidade);
                    cores.push(resposta[i].cor_principal);
                }

                if (graficoPokemon) {
                    graficoPokemon.destroy();
                }

                const ctx = document.getElementById('grafico_pokemon');

                graficoPokemon = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: dados,
                            backgroundColor: cores,
                            borderColor: cores,
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,

                        plugins: {
                            legend: {
                                display: false
                            }
                        },

                        scales: {

                            x: {
                                grid: {
                                    display: false
                                },
                                ticks: {
                                    maxRotation: 45,
                                    minRotation: 45,

                                    font: {
                                        weight: 'bold',
                                        size: 16
                                    }
                                }
                            },

                            y: {
                                beginAtZero: true,

                                ticks: {
                                    stepSize: 1
                                }
                            }
                        }
                    }
                });

            })
            .catch(error => {
                console.error(error);
            });
    }

    function carregarGraficoJogos() {

        fetch('/dashboard/grafico/jogos', { cache: 'no-store' })
            .then(response => {
                if (response.ok) {
                    return response.json();
                }

                throw new Error('Erro ao buscar dados dos jogos');
            })
            .then(resposta => {

                let labels = [];
                let dados = [];

                for (let i = 0; i < resposta.length; i++) {
                    labels.push(resposta[i].jogo);
                    dados.push(resposta[i].quantidade);
                }

                if (graficoJogos) {
                    graficoJogos.destroy();
                }

                const ctx = document.getElementById('grafico_jogo');

                graficoJogos = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: dados,
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,

                        plugins: {
                            legend: {
                                display: false
                            }
                        },

                        scales: {

                            x: {
                                grid: {
                                    display: false
                                },
                                ticks: {
                                    maxRotation: 45,
                                    minRotation: 45,

                                    font: {
                                        weight: 'bold',
                                        size: 16
                                    }
                                }
                            },

                            y: {
                                beginAtZero: true,

                                ticks: {
                                    stepSize: 1
                                }
                            }
                        }
                    }
                });

            })
            .catch(error => {
                console.error(error);
            });
    }

    function carregarKpiPokemon() {
        fetch ("/dashboard/kpi/pokemon", { cache: "no-store"} )
            .then(function (response) {
                if (response.ok) {
                    return response.json();
                }
            })
            .then(function (resposta) {
                if (resposta.length <= 0) {
                    console.error("Não foi encontrado nenhum pokémon");
                }
                else {
                    kpi_pokemon.innerHTML = resposta[0].pokemon;
                }
            })
            .catch(error => {
                console.error(error);
            })
    }

    function carregarKpiJogo() {
        fetch ("/dashboard/kpi/jogo", { cache: "no-store"} )
            .then(function (response) {
                if (response.ok) {
                    return response.json();
                }
            })
            .then(function (resposta) {
                if (resposta.length <= 0) {
                    console.error("Não foi encontrado nenhum jogo");
                }
                else {
                    kpi_jogo.innerHTML = resposta[0].jogo;
                }
            })
            .catch(error => {
                console.error(error);
            })
    }

    function carregarKpiGeracao() {
        fetch ("/dashboard/kpi/geracao", { cache: "no-store"} )
            .then(function (response) {
                if (response.ok) {
                    return response.json();
                }
            })
            .then(function (resposta) {
                if (resposta.length <= 0) {
                    console.error("Não foi encontrado nenhuma geração");
                }
                else {
                    kpi_geracao.innerHTML = resposta[0].geracao;
                }
            })
            .catch(error => {
                console.error(error);
            })
    }
</script>
</html>
